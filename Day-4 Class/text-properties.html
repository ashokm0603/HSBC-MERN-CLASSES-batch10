<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fleur+De+Leah&display=swap');

        h1 {
            color: transparent;
            background-image: linear-gradient(red, orange, blue);
            -webkit-background-clip: text;
            text-transform: uppercase;
            text-decoration-line: overline;
        }

        h2 {
            text-align: right;
            text-shadow: 10px 10px 10px red;
            text-transform: lowercase;
        }

        p {
            height: 150px;
            width: 450px;
            border: 5px solid green;
            letter-spacing: 1px;
            word-spacing: 10px;
            text-align: left;
            text-indent: 150px;
            text-transform: capitalize;
            /* text-decoration-line: underline;
            text-decoration-style: dashed;
            text-decoration-color: rgb(255,0,0);
            text-decoration-thickness: 5px; */
            /* text-decoration: overline double 1px orange; */
            overflow: auto;
            font-size: 14px;
            font-weight: bold;
            font-style: oblique;
            font-family: "Fleur De Leah", cursive;
        }
    </style>
</head>

<body>
    <h1>Text Properties</h1>
    <h2>Heading </h2>

    <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Enim porro atque quam minus tempore placeat dolorem
        quidem natus? Eos sed ullam quia voluptatem enim magni natus harum omnis illum corrupti!
    </p>
</body>

</html>
