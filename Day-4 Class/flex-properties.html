<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ol {
            padding: 45px 0px;
            background-color: salmon;
            list-style-type: none;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            /* flex-direction: column-reverse; */

            flex-wrap: wrap-reverse;
        }


        ol>li {
            /* width: 150px; */
            flex-grow: 1;
            text-align: center;
            margin: 8px 20px;
            background-color: palegreen;
            padding: 10px;
        }


        #container {
            background-color: papayawhip;
            padding: 50px;
            display: grid;
            grid-template-columns: auto auto auto auto;
            row-gap: 20px;
            column-gap: 20px;
        }

        #container div {
            background-color: brown;
            color: aliceblue;
            padding: 10px;
            text-align: center;
        }


        #container div:nth-child(1) {
            grid-column-start: 1;
            grid-column-end: 3;
        }


        #container div:nth-child(7) {
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 2;
            grid-row-end: 4;
        }
    </style>
</head>

<body>

    <ol>
        <li>HOME</li>
        <li>ABOUT</li>
        <li>HELP</li>
        <li>CONTACT</li>
        <li>LOGIN</li>
    </ol>



    <div id="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
        <div>11</div>
        <div>12</div>
        <div>13</div>
        <div>14</div>
        <div>15</div>
    </div>
</body>

</html>
